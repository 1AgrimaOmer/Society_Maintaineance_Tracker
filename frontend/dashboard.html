<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resident Dashboard - Society Maintenance Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <!-- Navigation -->
  <nav class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <h1 class="text-2xl font-bold text-blue-600">SMT</h1>
        <span class="text-gray-600">Resident Dashboard</span>
      </div>
      <div class="flex items-center space-x-4">
        <span id="userName" class="text-gray-700 font-semibold"></span>
        <button
          onclick="logout()"
          class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition"
        >
          Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto p-4 md:p-8">
    <!-- Notices Section -->
    <div id="noticesSection" class="mb-8"></div>

    <!-- Tabs -->
    <div class="flex space-x-4 mb-6 border-b border-gray-200">
      <button
        class="tab-btn px-4 py-2 font-semibold border-b-2 border-blue-600 text-blue-600"
        onclick="switchTab('complaints')"
      >
        My Complaints
      </button>
      <button
        class="tab-btn px-4 py-2 font-semibold border-b-2 border-transparent text-gray-600 hover:text-blue-600 hover:border-blue-300"
        onclick="switchTab('notices')"
      >
        Notices
      </button>
    </div>

    <!-- My Complaints Tab -->
    <div id="complaintsTab" class="tab-content">
      <!-- Create Complaint Form -->
      <div class="bg-white rounded-lg shadow-md p-6 mb-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4">File a New Complaint</h2>
        <form id="complaintForm" class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-gray-700 font-semibold mb-2">Title</label>
              <input
                type="text"
                id="complaintTitle"
                required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Brief title of complaint"
              />
            </div>
            <div>
              <label class="block text-gray-700 font-semibold mb-2">Category</label>
              <select
                id="complaintCategory"
                required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option value="">Select Category</option>
                <option value="Plumbing">Plumbing</option>
                <option value="Electrical">Electrical</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Cleaning">Cleaning</option>
                <option value="Noise">Noise</option>
                <option value="Parking">Parking</option>
                <option value="Security">Security</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-gray-700 font-semibold mb-2">Description</label>
            <textarea
              id="complaintDescription"
              required
              rows="4"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Describe the issue in detail"
            ></textarea>
          </div>

          <div>
            <label class="block text-gray-700 font-semibold mb-2">Upload Image (Optional)</label>
            <input
              type="file"
              id="complaintImage"
              accept="image/*"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
            <p class="text-xs text-gray-500 mt-1">Supported formats: JPG, PNG, GIF, WebP</p>
          </div>

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition"
          >
            Submit Complaint
          </button>
        </form>
      </div>

      <!-- Complaints List -->
      <div class="space-y-4">
        <h3 class="text-lg font-bold text-gray-800 mb-4">Your Complaints</h3>
        <div id="complaintsList" class="space-y-4"></div>
      </div>
    </div>

    <!-- Notices Tab -->
    <div id="noticesTab" class="tab-content hidden">
      <div id="noticesList" class="space-y-4"></div>
    </div>
  </div>

  <!-- Alert Messages -->
  <div id="alertBox" class="fixed top-4 right-4 max-w-sm z-50"></div>

  <!-- Complaint Detail Modal -->
  <div id="complaintModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-96 overflow-y-auto">
      <div class="p-6">
        <div class="flex justify-between items-start mb-4">
          <h2 id="modalTitle" class="text-2xl font-bold text-gray-800"></h2>
          <button
            onclick="closeModal()"
            class="text-gray-400 hover:text-gray-600 text-2xl"
          >
            ×
          </button>
        </div>
        <div id="modalContent" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script src="js/complaints.js"></script>
</body>
</html>
